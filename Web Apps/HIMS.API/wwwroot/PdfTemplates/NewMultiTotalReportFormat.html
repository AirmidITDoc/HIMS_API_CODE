<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style type="text/css">

        body {
            font: 15px Calibri,Arial;
            color: #000;
        }

        #dataTable {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
        }

            #dataTable th,
            #dataTable td {
                padding: 6px;
            }

            #dataTable th {
                border: 1px solid #666;
                background: #e6e6e6;
                text-align: center;
                font-weight: bold;
            }

            #dataTable td {
                border: 1px solid #bfbfbf;
            }

        .groupHeader,
        .subTotal,
        .billTotal,
        .grandTotal {
            font-weight: bold;
        }

        .groupHeader {
            background: #f2f2f2;
        }

        .subTotal {
            background: #e6e6e6;
        }

        .billTotal {
            border-top: 1px solid #666;
        }

        .grandTotal {
            background: #d9d9d9;
            border-top: 2px solid #000;
        }

        .center {
            text-align: center;
        }

        .right {
            text-align: right;
        }

        #dataTable thead {
            display: table-header-group;
        }

        #dataTable tr {
            page-break-inside: avoid;
        }
    </style>

</head>

<body>

    <div class="main-content-wrapper">

        <div class="invoice-box" style="margin:0 auto;">

            <table style="width:100%;">

                {{HospitalHeader}}

   
                <tr>
                    <td>
                        <table style="width:100%;">
                            <tr style="font-size:18px">
                                <td style="border-bottom:1px solid #ccc;padding-bottom:10px;">
                                    <b>{{RepoertName}}</b>
                                </td>
                                <td style="border-bottom:1px solid #ccc;padding-bottom:10px;text-align:right;">
                                    <b>Print Date : {{CurrentDate}}</b>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

       
                <tr>
                    <td>
                        <table style="width:100%;">
                            <tr>
                                <td style="padding:8px 0;font-size:16px;font-weight:bold;">
                                    From Date : {{FromDate}}  --  To Date : {{ToDate}}
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

   
                <tr>
                    <td>

                        <table id="dataTable">

                            <thead>
                                {{HeaderItems}}
                            </thead>

                            <tbody>
                                {{Items}}
                                {{ItemsTotal}}
                            </tbody>

                        </table>

                    </td>
                </tr>

            </table>

        </div>

    </div>

</body>
</html>
