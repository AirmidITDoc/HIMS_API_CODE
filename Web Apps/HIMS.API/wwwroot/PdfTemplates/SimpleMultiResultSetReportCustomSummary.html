<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report</title>
    <style>

        body {
            font: 13px Calibri,Arial;
            color: #000;
            margin: 0;
        }

        .report-wrapper {
            padding: 4px;
        }

        .report-title {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #aaa;
            padding-bottom: 6px;
        }

        .report-print-date,
        .report-date-range {
            font-size: 14px;
            font-weight: bold;
        }

        .report-print-date {
            text-align: right;
            border-bottom: 1px solid #aaa;
        }

        .data-table,
        #dataTable {
            width: 100%;
            border-collapse: collapse;
        }

            .data-table th,
            #dataTable th {
                border: 1px solid #666;
                background: #e6e6e6;
                padding: 6px;
                text-align: center;
                font-weight: bold;
            }

            .data-table td,
            #dataTable td {
                border: 1px solid #bfbfbf;
                padding: 4px;
            }

        .groupHeader,
        .billTotal,
        .subTotal,
        .grandTotal,
        .row-total td {
            font-weight: bold;
        }

        .groupHeader {
            background: #f2f2f2;
        }

        .subTotal,
        .row-total td {
            background: #efefef;
        }

        .billTotal {
            border-top: 1px solid #666;
        }

        .grandTotal,
        .row-total td {
            border-top: 2px solid #000;
        }

        .align-right,
        .right {
            text-align: right;
        }

        .align-center,
        .center {
            text-align: center;
        }

        .data-table thead,
        #dataTable thead {
            display: table-header-group;
        }

        .data-table tr,
        #dataTable tr {
            page-break-inside: avoid;
        }
    </style>
</head>
<body>
    <div class="report-wrapper">
        <table style="width:100%;">{{HospitalHeader}}</table>

        <table width="100%" cellpadding="0" cellspacing="0">
            <tr>
                <td class="report-title">{{RepoertName}}</td>
                <td class="report-print-date">Print Date : {{CurrentDate}}</td>
            </tr>
        </table>

        <div class="report-date-range">From Date : {{FromDate}} — To Date : {{ToDate}}</div>

        <table id="dataTable">
            <thead>{{HeaderItems}}</thead>
            <tbody>{{Items}}{{ItemsTotal}}</tbody>
        </table>
        {{SummaryBlock}}

        {{ResultSetTables}}
    </div>
</body>
</html>
