<table style="width:100%; border-collapse:collapse; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;">

    <!-- HEADER -->
    <tr class="top-header-row">
        <td style="padding:6px;">

            <!-- TEXT HEADER -->
            <table style="width:100%; border-collapse:collapse; display:{{TextHeaderDisplay}};">
                <tr style="font-size:16px;">

                    <!-- LEFT LOGO -->
                    <td style="width:20%; text-align:center; vertical-align:top; padding:6px;">
                        <img src="{{logo}}" alt="logo" width="120" style="display:block; margin:auto;">
                    </td>

                    <!-- CENTER CONTENT -->
                    <td style="width:60%; text-align:center; vertical-align:top; padding:0;">

                        <div style="font-size:15px;">
                            {{HospitalHeaderLine}}
                        </div>

                        <div style="font-size:20px; font-weight:600;">
                            {{HospitalName}}
                        </div>

                        <div style="font-size:13px; display:{{chkHospitalShortNameFlag}};">
                            {{HospitalShortName}}
                        </div>

                        <div style="font-size:13px;">
                            {{Address}} {{City}} - {{Pin}}
                        </div>

                        <div style="font-size:13px; white-space:nowrap;">
                            {{Phone}} | {{EmailID}} | {{WebSiteInfo}}
                        </div>

                    </td>

                    <!-- RIGHT LOGO -->
                    <td style="width:20%; text-align:center; vertical-align:top; padding:6px;">
                        <div style="display:{{chklogo2flag}};">
                            <img src="{{logo2}}" alt="logo2" width="120" style="display:block; margin:auto;">
                        </div>
                    </td>

                </tr>
            </table>

            <!-- DIVIDER -->
            <table style="width:100%; border-collapse:collapse;">
                <tr>
                    <td style="height:1px; font-size:0;">&nbsp;</td>
                </tr>
            </table>

        </td>
    </tr>

    <!-- IMAGE HEADER -->
    <tr style="display:{{ImageHeaderDisplay}};">
        <td>

            <table style="width:100%; border-collapse:collapse;">
                <tr>
                    <td style="padding:5px;">
                        <img src="{{hospitalinfo}}" alt="hospitalinfo"
                             style="display:block; width:100%; height:auto; border:0;">
                    </td>
                </tr>
            </table>

            <table style="width:100%; border-collapse:collapse; margin:5px 0;">
                <tr>
                    <td style="border-top:1px solid #000; height:1px; padding:0;"></td>
                </tr>
            </table>

        </td>
    </tr>

    <!-- TEMPLATE HEADER -->
    <tr style="display:{{TemplateHeaderDisplay}};">
        <td>

            <table style="width:100%; border-collapse:collapse;">
                <tr>
                    <td style="padding:5px;">
                        {{hospitalTemplate}}
                    </td>
                </tr>
            </table>

            <table style="width:100%; border-collapse:collapse; margin:5px 0;">
                <tr>
                    <td style="border-top:1px solid #000; height:1px; padding:0;"></td>
                </tr>
            </table>

        </td>
    </tr>

</table>
