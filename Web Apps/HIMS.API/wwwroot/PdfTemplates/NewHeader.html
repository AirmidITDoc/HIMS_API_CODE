
        <table style="width:100% !important; border-collapse:collapse !important; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif !important; font-size:14px !important; line-height:normal !important; color:#101828 !important;">

            <!-- TEXT HEADER -->
            <tr style="display:{{TextHeaderDisplay}};">

                <!-- LEFT LOGO -->
                <td style="width:20% !important; text-align:center !important; vertical-align:top !important; padding:6px !important;">
                    <img src="{{logo}}" alt="logo" width="120" style="display:block !important; margin:auto !important;">
                </td>

                <!-- CENTER CONTENT -->
                <td style="width:60% !important; text-align:center !important; vertical-align:top !important; padding:4px !important;">
                    <div style="font-size:13px !important; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif !important; color:#101828 !important; line-height:1.4 !important; font-weight:normal !important;">
                        {{HospitalHeaderLine}}
                    </div>
                    <div style="font-size:20px !important; font-weight:700 !important; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif !important; color:#101828 !important; line-height:1.4 !important;">
                        {{HospitalName}}
                    </div>
                    <div style="font-size:12px !important; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif !important; color:#101828 !important; line-height:1.4 !important; font-weight:normal !important; width:100% !important;">
                            {{HospitalShortName}}
                    </div>
                    <div style="font-size:12px !important; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif !important; color:#101828 !important; line-height:1.4 !important; font-weight:normal !important;">
                        {{Address}} {{City}} - {{Pin}}
                    </div>
                    <div style="font-size:12px !important; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif !important; color:#101828 !important; line-height:1.4 !important; font-weight:normal !important; white-space:normal !important;">
                        {{Phone}} | {{EmailID}} | {{WebSiteInfo}}
                    </div>
                </td>

                <!-- RIGHT LOGO -->
                <td style="width:20% !important; text-align:right !important; vertical-align:top !important; padding:6px !important;">
                    <div style="display:{{chklogo2flag}};">
                        <img src="{{logo2}}" alt="logo2" width="120" style="display:block !important; margin-left:auto !important; margin-right:0 !important;">
                    </div>
                </td>

            </tr>

            <!-- DIVIDER -->
            <tr>
                <td colspan="3" style="border-top:1px solid #d4c3c3 !important; height:1px !important; padding:0 !important; font-size:0 !important;"></td>
            </tr>

        </table>

        <!-- IMAGE HEADER -->
        <table style="width:100% !important; border-collapse:collapse !important; display:{{ImageHeaderDisplay}};">
            <tr>
                <td style="padding:5px !important;">
                    <img src="{{hospitalinfo}}" alt="hospitalinfo" style="display:block !important; width:100% !important; height:auto !important; border:0 !important;">
                </td>
            </tr>
            <tr>
                <td style="border-top:1px solid #000 !important; height:1px !important; padding:0 !important;"></td>
            </tr>
        </table>

        <!-- TEMPLATE HEADER -->
        <table style="width:100% !important; border-collapse:collapse !important; display:{{TemplateHeaderDisplay}};">
            <tr>
                <td style="padding:5px !important;">
                    {{hospitalTemplate}}
                </td>
            </tr>
            <tr>
                <td style="border-top:1px solid #000 !important; height:1px !important; padding:0 !important;"></td>
            </tr>
        </table>
