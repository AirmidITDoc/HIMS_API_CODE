

<table style="width:100%;border-collapse:collapse;font-family:Helvetica,Arial,sans-serif;font-size:14px;color:#101828;">
    <tr style="display:{{TextHeaderDisplay}};">
        <td style="width:20%;text-align:center;vertical-align:top;padding:6px;">
            <img src="{{logo}}" alt="logo" width="120">
        </td>
        <td style="width:60%;text-align:center;vertical-align:top;padding:4px;">

            <div style="font-size:13px;line-height:1.4;">
                {{HospitalHeaderLine}}
            </div>

            <div style="font-size:20px;font-weight:bold;line-height:1.4;">
                {{HospitalName}}
            </div>

            <div style="font-size:12px;line-height:1.4;">
                {{HospitalShortName}}
            </div>

            <div style="font-size:12px;line-height:1.4;">
                {{Address}} {{City}} - {{Pin}}
            </div>

            <div style="font-size:12px;line-height:1.4;">
                {{Phone}} | {{EmailID}} | {{WebSiteInfo}}
            </div>
        </td>
        <td style="width:20%;text-align:right;vertical-align:top;padding:6px;">
            <div style="display:{{chklogo2flag}};">
                <img src="{{logo2}}" alt="logo2" width="120">
            </div>
        </td>
    </tr>

    <tr>
        <td colspan="3" style="border-top:1px solid #d4c3c3;padding:0;"></td>
    </tr>

</table>

<table style="width:100%;border-collapse:collapse;display:{{ImageHeaderDisplay}};">
    <tr>
        <td style="padding:5px;">
            <img src="{{hospitalinfo}}" alt="hospitalinfo" style="width:100%;">
        </td>
    </tr>
    <tr>
        <td style="border-top:1px solid #000;padding:0;"></td>
    </tr>
</table>

<table style="width:100%;border-collapse:collapse;display:{{TemplateHeaderDisplay}};">
    <tr>
        <td style="padding:5px;">
            {{hospitalTemplate}}
        </td>
    </tr>
    <tr>
        <td style="border-top:1px solid #000;padding:0;"></td>
    </tr>
</table>
