<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            font-family: Calibri, Arial;
            font-size: 16px;
        }

        #dataTable {
            width: 100%;
            border-collapse: collapse;
        }

            /* HEADER */

            #dataTable th {
                border: 1px solid #666;
                background: #e6e6e6;
                padding: 8px;
                text-align: center;
                font-size: 16px;
            }
            /* NORMAL ROWS */

            #dataTable td {
                border: 1px solid #bfbfbf;
                padding: 6px;
            }

        /* GROUP HEADER */

        .groupHeader {
            background: #f2f2f2;
            font-weight: bold;
            font-size: 17px;
        }

        /* BILL TOTAL */

        .billTotal {
            font-weight: bold;
            border-top: 1px solid #666;
        }

        /* SUBTOTAL */

        .subTotal {
            background: #e6e6e6;
            font-weight: bold;
        }

        /* GRAND TOTAL */

        .grandTotal {
            background: #d9d9d9;
            font-weight: bold;
            border-top: 3px solid #000;
        }

        /* ALIGNMENT */

        .center {
            text-align: center;
        }

        .right {
            text-align: right;
        }

        #dataTable thead {
            display: table-header-group;
        }

        #dataTable tr {
            page-break-inside: avoid;
        }
    </style>

</head>

<body>

    <div class="main-content-wrapper">

        <div class="invoice-box" style="margin:0 auto;color:#000;">

            <table style="width:100%;">

                {{HospitalHeader}}

                <tr>
                    <td>

                        <table style="width:100%;">

                            <tr style="font-size:20px">

                                <td style="border-bottom:1px solid #ccc;padding-bottom:10px">
                                    <b>{{RepoertName}}</b>
                                </td>

                                <td style="border-bottom:1px solid #ccc;padding-bottom:10px;text-align:right">
                                    <b>Print Date : {{CurrentDate}}</b>
                                </td>

                            </tr>

                        </table>

                    </td>
                </tr>

                <tr>
                    <td>

                        <table style="width:100%">
                            <tr>
                                <td style="padding-top:8px;padding-bottom:8px;font-size:17px;font-weight:bold">
                                    From Date : {{FromDate}}  --  To Date : {{ToDate}}
                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>

                <tr>
                    <td>

                        <table id="dataTable">

                            <thead>

                                <tr>

                                    <th>Bill Num</th>
                                    <th>Date</th>
                                    <th>Patient Code</th>
                                    <th>Patient Name</th>
                                    <th>Doctor Name</th>

                                    <th>Gross Amt</th>
                                    <th>Disc</th>
                                    <th>NetAmt</th>

                                    <th>Receipt</th>
                                    <th>Due</th>
                                    <th>Refund</th>

                                    <th>Net Promotion</th>

                                </tr>

                            </thead>

                            <tbody>

                                {{Items}}

                            </tbody>

                        </table>

                    </td>
                </tr>

            </table>

        </div>

    </div>

</body>
</html>
